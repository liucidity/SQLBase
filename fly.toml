# fly.toml app configuration file generated for sqlbase on 2026-04-17T23:54:37-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sqlbase'
primary_region = 'ord'

[env]
  NODE_ENV = "production"

[build]

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
